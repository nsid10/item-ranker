<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!--==================== UNICONS ====================-->
        <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />

        <title>Rank Grid</title>

        <link rel="stylesheet" href="./css/style.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    </head>
    <body>
        <nav class="nav-container">
            <button class="nav-btn active" onclick="window.location.href='./index.html'" title="Grid">
                <i class="uil uil-apps"></i>
                <span>Grid</span>
            </button>
            <button class="nav-btn" onclick="window.location.href='./pages/tierlist.html'" title="Tier List">
                <i class="uil uil-list-ul"></i>
                <span>Tier List</span>
            </button>
            <button class="nav-btn" onclick="window.location.href='./pages/bracket.html'" title="Bracket">
                <i class="uil uil-shield"></i>
                <span>Bracket</span>
            </button>
        </nav>

        <div class="controls-container">
            <button id="theme-toggle" title="Toggle Theme">
                <i class="uil uil-moon"></i>
            </button>
            <button id="rank-btn" title="Start Ranking">
                <i class="uil uil-trophy"></i>
            </button>
            <button id="download-btn" title="Download Grid">
                <i class="uil uil-image-download"></i>
            </button>
            <button id="clear-all-btn" title="Clear All Grid">
                <i class="uil uil-trash-alt"></i>
            </button>
        </div>

        <h1>My Ranking</h1>
        <div id="grid-container"></div>
        <div id="row-controls">
            <button id="remove-row-btn" title="Remove Row">
                <i class="uil uil-minus"></i>
            </button>
            <button id="add-row-btn" title="Add Row">
                <i class="uil uil-plus"></i>
            </button>
        </div>
        <script src="./js/state.js"></script>
        <script src="./js/theme.js"></script>
        <script src="./js/ranker.js"></script>
        <script src="./js/grid.js"></script>
    </body>
</html>
