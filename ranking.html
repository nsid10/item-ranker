<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />
        <title>Rank Grid — Ranking Engine</title>
        <link rel="stylesheet" href="./css/style.css" />
        <link rel="stylesheet" href="./css/ranking.css" />
    </head>
    <body>
        <div class="controls-container">
            <button id="theme-toggle" title="Toggle Theme">
                <i class="uil uil-moon"></i>
            </button>
            <button onclick="window.location.href='./index.html'" title="Go to Grid">
                <i class="uil uil-apps"></i>
            </button>
        </div>

        <!-- Phase 1: Upload -->
        <div id="upload-phase">
            <h1>Ranking Engine</h1>
            <div id="upload-area">
                <i class="uil uil-cloud-upload"></i>
                <p>Drop images here or <label for="file-input">browse</label></p>
                <p class="upload-hint">Up to 100 images</p>
                <input type="file" id="file-input" accept="image/*" multiple />
            </div>
            <p id="upload-count" class="hidden">0 / 100 images</p>
            <div id="preview-grid"></div>
            <button id="start-ranking-btn" class="primary-btn" disabled>
                <i class="uil uil-play"></i> Start Ranking
            </button>
        </div>

        <!-- Phase 2: Head-to-head -->
        <div id="ranking-phase" class="phase hidden">
            <p id="match-progress">
                Match <span id="match-num">1</span> / ~<span id="match-est">?</span>
            </p>
            <p class="pick-hint">Click the winner</p>
            <div id="match-container">
                <div class="match-side" id="side-a">
                    <img id="img-a" alt="Option A" />
                </div>
                <div id="vs-label">VS</div>
                <div class="match-side" id="side-b">
                    <img id="img-b" alt="Option B" />
                </div>
            </div>
        </div>

        <script src="./js/state.js"></script>
        <script src="./js/theme.js"></script>
        <script src="./js/ranking.js"></script>
    </body>
</html>
