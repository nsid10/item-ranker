<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />
        <title>Rank Grid — Tier List</title>
        <link rel="stylesheet" href="../css/style.css" />
        <link rel="stylesheet" href="../css/tierlist.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    </head>
    <body>
        <nav class="nav-container">
            <button class="nav-btn" onclick="window.location.href='../index.html'" title="Grid">
                <i class="uil uil-apps"></i>
                <span>Grid</span>
            </button>
            <button class="nav-btn active" onclick="window.location.href='./tierlist.html'" title="Tier List">
                <i class="uil uil-list-ul"></i>
                <span>Tier List</span>
            </button>
            <button class="nav-btn" onclick="window.location.href='./tournament.html'" title="Tournament">
                <i class="uil uil-shield"></i>
                <span>Tournament</span>
            </button>
        </nav>

        <div class="controls-container">
            <button id="theme-toggle" title="Toggle Theme">
                <i class="uil uil-moon"></i>
            </button>
            <button id="rank-btn" title="Start Ranking">
                <i class="uil uil-trophy"></i>
            </button>
            <button id="download-btn" title="Download Tier List">
                <i class="uil uil-image-download"></i>
            </button>
            <button id="clear-btn" title="Clear All Tiers">
                <i class="uil uil-trash-alt"></i>
            </button>
        </div>

        <h1>My Tier List</h1>

        <div id="tierlist-main">
            <button class="add-tier-btn" id="add-top-btn">
                <i class="uil uil-plus"></i> Add Tier
            </button>
            <div id="tier-container"></div>
            <button class="add-tier-btn" id="add-bottom-btn">
                <i class="uil uil-plus"></i> Add Tier
            </button>
        </div>

        <div id="unranked-section">
            <p class="unranked-title">Unranked</p>
            <div id="unranked-pool"></div>
            <div id="upload-area">
                <i class="uil uil-cloud-upload"></i>
                <p>Drop images here or <label for="file-input">browse</label></p>
                <input type="file" id="file-input" accept="image/*" multiple hidden />
            </div>
        </div>

        <script src="../js/state.js"></script>
        <script src="../js/theme.js"></script>
        <script src="../js/ranker.js"></script>
        <script src="../js/tierlist.js"></script>
    </body>
</html>
